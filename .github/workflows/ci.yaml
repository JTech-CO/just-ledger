name: ci

# 경로 변경 기반 매트릭스 (M0 DoD 4).
# 언어 잡은 (자기 소유 디렉터리 또는 contracts/ 가 바뀌었고) AND (그 모듈의 소스가 존재할 때)만 실행된다.
#   - contracts/ 는 언어 간 단일 진실원천이므로 변경 시 모든 소비 모듈을 재검증 대상으로 올린다.
#   - 소스 존재(매니페스트) 게이트 덕분에 아직 착수 전인 모듈 잡은 스킵되고(M0에서 그린),
#     해당 phase 에서 코드가 들어오는 순간 자동으로 켜진다.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:   # 수동 전체 실행 (소스 있는 잡만) — CI 인프라 검증·M9 음성 테스트용

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── 변경 경로 + 소스 존재 감지 ────────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      contracts: ${{ steps.filter.outputs.contracts }}
      lua: ${{ steps.filter.outputs.lua }}
      web: ${{ steps.filter.outputs.web }}
      worker: ${{ steps.filter.outputs.worker }}
      prolog: ${{ steps.filter.outputs.prolog }}
      realtime: ${{ steps.filter.outputs.realtime }}
      wasm: ${{ steps.filter.outputs.wasm }}
      dsl: ${{ steps.filter.outputs.dsl }}
      settlement: ${{ steps.filter.outputs.settlement }}
      analytics: ${{ steps.filter.outputs.analytics }}
      simulation: ${{ steps.filter.outputs.simulation }}
      db: ${{ steps.filter.outputs.db }}
      web_src: ${{ steps.src.outputs.web }}
      worker_src: ${{ steps.src.outputs.worker }}
      prolog_src: ${{ steps.src.outputs.prolog }}
      realtime_src: ${{ steps.src.outputs.realtime }}
      wasm_src: ${{ steps.src.outputs.wasm }}
      dsl_src: ${{ steps.src.outputs.dsl }}
      settlement_src: ${{ steps.src.outputs.settlement }}
      analytics_src: ${{ steps.src.outputs.analytics }}
      simulation_src: ${{ steps.src.outputs.simulation }}
      db_src: ${{ steps.src.outputs.db }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            contracts: &contracts
              - 'contracts/**'
            web:
              - *contracts
              - 'apps/web/**'
            worker:
              - *contracts
              - 'services/worker/**'
              # records_test.go 가 정산 골든을 직접 읽는다 — 골든 변경도 재검증
              - 'fixtures/settlement/**'
            prolog:
              - *contracts
              - 'services/prolog/**'
              - 'fixtures/classify/**'
            realtime:
              - *contracts
              - 'services/realtime/**'
              # 통합 테스트가 스키마·NOTIFY 발행부를 그대로 쓴다 (봉투 계약)
              - 'db/migrations/**'
              - 'db/triggers/**'
            wasm:
              - *contracts
              - 'modules/statement-wasm/**'
            dsl:
              - *contracts
              - 'modules/rules-dsl/**'
            settlement:
              - *contracts
              - 'modules/settlement/**'
              # INV-7 게이트의 정본·골든이 여기 있다 — 이들 변경이 잡을
              # 트리거하지 않으면 반올림 규칙 변조가 무신호로 통과한다
              - 'scripts/parity/**'
              - 'fixtures/settlement/**'
            analytics:
              - *contracts
              - 'modules/analytics/**'
              # 골든·토큰 SSOT 변경도 잡을 트리거 (M5 INV-7 우회 교훈)
              - 'fixtures/analytics/**'
              - 'apps/web/client/styles/tokens.css'
            simulation:
              - *contracts
              - 'modules/simulation/**'
              - 'fixtures/simulation/**'
            db:
              - *contracts
              - 'db/**'
            lua:
              - 'scripts/linguist-gate.lua'
              - 'scripts/tests/**'
              - 'services/worker/sandbox/**'
      - name: 모듈 소스 존재 감지 (매니페스트)
        id: src
        run: |
          exists() { find "$1" -maxdepth 2 -name "$2" 2>/dev/null | grep -q . && echo true || echo false; }
          {
            echo "web=$([ -f apps/web/package.json ] && echo true || echo false)"
            echo "worker=$([ -f services/worker/go.mod ] && echo true || echo false)"
            echo "prolog=$(exists services/prolog '*.prolog')"
            echo "realtime=$([ -f services/realtime/mix.exs ] && echo true || echo false)"
            echo "wasm=$([ -f modules/statement-wasm/Cargo.toml ] && echo true || echo false)"
            echo "dsl=$(exists modules/rules-dsl '*.cabal')"
            echo "settlement=$(exists modules/settlement '*.cbl')"
            echo "analytics=$([ -f modules/analytics/main.R ] && echo true || echo false)"
            echo "simulation=$([ -f modules/simulation/Project.toml ] && echo true || echo false)"
            echo "db=$(exists db '*.pgsql')"
          } >> "$GITHUB_OUTPUT"

  # ── 계약 검증 (변경 시 항상, 소스 게이트 없음 — 계약 자체가 소스) ──────────
  contracts:
    needs: changes
    if: ${{ needs.changes.outputs.contracts == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '24' }
      - run: npm i --no-save ajv@8 ajv-formats@3
      - run: node contracts/check.mjs

  # ── JavaScript (web) ─────────────────────────────────────────────────────
  # test:api/test:ui 는 실제 PostgreSQL(스크래치 DB) 위에서 돈다 — db 잡과 동일 구성.
  web:
    needs: changes
    if: ${{ needs.changes.outputs.web == 'true' && needs.changes.outputs.web_src == 'true' }}
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env: { POSTGRES_PASSWORD: postgres, POSTGRES_DB: ledger }
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres" --health-interval 5s
          --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/ledger
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 11 }
      - uses: actions/setup-node@v4
        with: { node-version: '24', cache: 'pnpm', cache-dependency-path: apps/web/pnpm-lock.yaml }
      # 테스트 헬퍼가 psql 로 마이그레이션을 적용한다 — 서버(18)와 클라이언트 정합
      - name: postgresql-client-18 (pgdg)
        run: |
          sudo apt-get update && sudo apt-get install -y postgresql-common
          sudo /usr/share/postgresql-common/pgdg/apt.postgresql.org.sh -y
          sudo apt-get install -y postgresql-client-18
      # 클라이언트가 statement-wasm pkg 를 임포트 — vite 빌드 전에 wasm 산출 필요
      - uses: dtolnay/rust-toolchain@stable
        with: { toolchain: '1.97.1', targets: wasm32-unknown-unknown }
      - uses: jetli/wasm-pack-action@v0.4.0
      - run: cd modules/statement-wasm && wasm-pack build --target web --release
      - run: cd apps/web && pnpm install --frozen-lockfile
      - run: cd apps/web && pnpm lint
      - run: make check-no-float
      - run: cd apps/web && pnpm build
      - run: cd apps/web && pnpm test:api
      - run: cd apps/web && pnpm test:ui

  # ── Go (worker + Lua 샌드박스) ───────────────────────────────────────────
  # 인제스트 통합 테스트는 실제 PostgreSQL(스크래치 DB) 위에서 돈다 — db 잡과 동일 구성.
  worker:
    needs: changes
    if: ${{ needs.changes.outputs.worker == 'true' && needs.changes.outputs.worker_src == 'true' }}
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env: { POSTGRES_PASSWORD: postgres, POSTGRES_DB: ledger }
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres" --health-interval 5s
          --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/ledger
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.26.5', cache-dependency-path: services/worker/go.sum }
      - name: postgresql-client-18 (pgdg)
        run: |
          sudo apt-get update && sudo apt-get install -y postgresql-common
          sudo /usr/share/postgresql-common/pgdg/apt.postgresql.org.sh -y
          sudo apt-get install -y postgresql-client-18
      - run: cd services/worker && go vet ./...
      - run: cd services/worker && go build ./...
      - run: cd services/worker && go test ./...

  # ── Prolog (분류·매칭) ───────────────────────────────────────────────────
  prolog:
    needs: changes
    if: ${{ needs.changes.outputs.prolog == 'true' && needs.changes.outputs.prolog_src == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # 컨테이너와 동일한 SWI-Prolog(ppa stable, 10.x) — 배포판 버전은 library(json)
      # 등 라이브러리 경로가 달라 골든 로더가 깨진다 (잡 첫 활성화에서 노출)
      - name: swi-prolog (ppa stable)
        run: |
          sudo apt-get update && sudo apt-get install -y software-properties-common
          sudo add-apt-repository -y ppa:swi-prolog/stable
          sudo apt-get update && sudo apt-get install -y swi-prolog-nox
      - run: swipl -g run_tests -t halt services/prolog/tests/suite.prolog

  # ── Elixir (realtime) ────────────────────────────────────────────────────
  realtime:
    needs: changes
    if: ${{ needs.changes.outputs.realtime == 'true' && needs.changes.outputs.realtime_src == 'true' }}
    runs-on: ubuntu-latest
    # 통합 테스트(전파 지연·동시 연결·복구)는 실제 NOTIFY 경로가 필요하다
    services:
      postgres:
        image: postgres:18
        env: { POSTGRES_PASSWORD: postgres, POSTGRES_DB: ledger }
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres" --health-interval 5s
          --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/ledger
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with: { otp-version: '27.3.3', elixir-version: '1.18.3' }   # 컨테이너 확정 버전과 동일
      - name: postgresql-client-18 (pgdg)
        run: |
          sudo apt-get update && sudo apt-get install -y postgresql-common
          sudo /usr/share/postgresql-common/pgdg/apt.postgresql.org.sh -y
          sudo apt-get install -y postgresql-client-18
      - uses: actions/cache@v4
        with:
          path: |
            services/realtime/deps
            services/realtime/_build
          key: mix-${{ hashFiles('services/realtime/mix.lock') }}
      - run: cd services/realtime && mix deps.get
      - run: cd services/realtime && mix format --check-formatted
      - run: cd services/realtime && MIX_ENV=test mix compile --warnings-as-errors
      - run: cd services/realtime && mix credo --strict
      - run: make test-realtime

  # ── Rust WASM (인제스트 파서) ────────────────────────────────────────────
  wasm:
    needs: changes
    if: ${{ needs.changes.outputs.wasm == 'true' && needs.changes.outputs.wasm_src == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        # flow 스타일에서 콤마는 구분자로 파싱된다 — components 는 반드시 따옴표
        with: { toolchain: '1.97.1', targets: wasm32-unknown-unknown, components: 'clippy,rustfmt' }
      - uses: jetli/wasm-pack-action@v0.4.0
      - run: cd modules/statement-wasm && cargo fmt --check
      - run: cd modules/statement-wasm && cargo clippy -- -D warnings
      - run: cd modules/statement-wasm && cargo test
      - run: cd modules/statement-wasm && wasm-pack build --target web --release

  # ── Haskell (규칙 DSL) ───────────────────────────────────────────────────
  dsl:
    needs: changes
    if: ${{ needs.changes.outputs.dsl == 'true' && needs.changes.outputs.dsl_src == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # cabal-update: false — setup 이 부팅 시 cabal update 를 돌리는데, 그 경로가
      # dream.io Hackage 미러(간헐 404, cabal#9516)에 의존해 잡을 죽인다. 갱신은
      # 아래에서 실패를 허용하며 직접 돌리고, 인덱스는 캐시에서 복원한다.
      - uses: haskell-actions/setup@v2
        with: { ghc-version: '9.10.3', cabal-version: '3.16.1.0', cabal-update: false }   # 컨테이너 확정 버전
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cabal
            ~/.cache/cabal
            ~/.local/state/cabal
            modules/rules-dsl/dist-newstyle
          key: dsl-${{ runner.os }}-ghc9.10.3-${{ hashFiles('modules/rules-dsl/rules-dsl.cabal') }}
          restore-keys: dsl-${{ runner.os }}-ghc9.10.3-
      # 미러 404 여도 캐시된 패키지 인덱스로 build 가 되도록 update 실패를 허용한다.
      # 캐시 미스 + 미러 장애가 겹치면 build 가 실패하며 원인을 드러낸다(조용한 통과 아님).
      - run: cd modules/rules-dsl && (cabal update || echo "cabal update 실패 — 캐시 인덱스로 진행")
      - run: cd modules/rules-dsl && cabal build
      - run: cd modules/rules-dsl && cabal test

  # ── COBOL (마감 정산) + 정합성 대조 ───────────────────────────────────────
  settlement:
    needs: changes
    if: ${{ needs.changes.outputs.settlement == 'true' && needs.changes.outputs.settlement_src == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '24' }
      # make test-settlement 이 go test ./settlement/... 을 포함한다 —
      # 러너 프리인스톨 Go 에 의존하지 않도록 worker 잡과 동일 버전 핀
      - uses: actions/setup-go@v5
        with: { go-version: '1.26.5', cache-dependency-path: services/worker/go.sum }
      - run: sudo apt-get update && sudo apt-get install -y gnucobol
      - run: make build-settlement
      - run: make test-settlement
      - run: make parity-settlement   # INV-7: COBOL ↔ JS 참조 구현 차이 0원

  # ── R (분석) ─────────────────────────────────────────────────────────────
  analytics:
    needs: changes
    if: ${{ needs.changes.outputs.analytics == 'true' && needs.changes.outputs.analytics_src == 'true' }}
    runs-on: ubuntu-latest
    env:
      R_LIBS_USER: ${{ github.workspace }}/.r-libs
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with: { r-version: '4.3.3' }   # 컨테이너(noble apt r-base) 확정 버전과 동일 — M6 골든 바이트 동일성 전제
      # 폰트·렌더링 의존 — SVG 텍스트 메트릭 결정론의 전제 (DejaVu 고정)
      - run: sudo apt-get update && sudo apt-get install -y fonts-dejavu-core libfontconfig1-dev libfreetype6-dev libpng-dev
      - uses: actions/cache@v4
        with:
          path: .r-libs
          key: r-libs-${{ hashFiles('modules/analytics/DEPENDS.lock') }}
      # P3M 날짜 스냅샷 — 컨테이너 실설치본(DEPENDS.lock)과 동일 버전 복원.
      # 스냅샷 날짜는 DEPENDS.lock 이 SSOT (워크플로에 날짜를 두 벌 두지 않는다).
      # tests/run.R 의 version-lock 단언이 드리프트를 즉시 잡는다 (미결질문 #4 결정)
      - name: R 패키지 (DEPENDS.lock 스냅샷)
        run: |
          mkdir -p "$R_LIBS_USER"
          SNAP=$(jq -r .snapshot modules/analytics/DEPENDS.lock)
          echo "스냅샷: $SNAP → $R_LIBS_USER"
          Rscript -e "install.packages(c('ggplot2','jsonlite','svglite'), lib = Sys.getenv('R_LIBS_USER'), repos = 'https://packagemanager.posit.co/cran/__linux__/noble/$SNAP')"
          # 캐시가 빈 디렉터리를 담지 않도록 실제 설치를 확인한다
          Rscript -e 'n <- length(list.files(Sys.getenv("R_LIBS_USER"))); cat("설치 패키지 수:", n, "\n"); stopifnot(n > 0)'
      - run: make test-analytics

  # ── Julia (시뮬레이션) ───────────────────────────────────────────────────
  simulation:
    needs: changes
    if: ${{ needs.changes.outputs.simulation == 'true' && needs.changes.outputs.simulation_src == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with: { version: '1.11.5' }   # 컨테이너 확정 버전 — RNG 스트림 동일성(결정론 골든) 전제
      - uses: julia-actions/cache@v2
      - run: julia --project=modules/simulation -e 'using Pkg; Pkg.instantiate()'
      - run: make test-simulation

  # ── PLpgSQL (스키마·불변식) ──────────────────────────────────────────────
  db:
    needs: changes
    if: ${{ needs.changes.outputs.db == 'true' && needs.changes.outputs.db_src == 'true' }}
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env: { POSTGRES_PASSWORD: postgres, POSTGRES_DB: ledger }
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres" --health-interval 5s
          --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/ledger
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '24' }   # db/tests/validate-notify.mjs (ajv 계약 검증)
      # psql/pg_dump 는 서버(18)와 메이저 일치해야 한다 — 러너 기본 client(16)는 pg_dump 거부.
      - name: postgresql-client-18 (pgdg)
        run: |
          sudo apt-get update && sudo apt-get install -y postgresql-common
          sudo /usr/share/postgresql-common/pgdg/apt.postgresql.org.sh -y
          sudo apt-get install -y postgresql-client-18
      - run: make test-db

  # ── Lua 게이트 스크립트 자체 검증 (게이트+테스트 파일은 항상 존재) ─────────
  # 골든 테스트는 require 로 판정 함수를 직접 검증하므로 dkjson 불필요(순수 Lua)
  lua-gate:
    needs: changes
    if: ${{ needs.changes.outputs.lua == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y lua5.4
      - run: lua5.4 scripts/tests/linguist-gate.test.lua

  # ── 언어 구성 게이트 (M9 DoD). ────────────────────────────────────────────
  # 게이트 로직은 완전히 강제되지만, M0~M8 동안은 계측 언어가 점증적으로 채워지므로
  # 정당하게 실패한다(예: M0 에는 Lua 만 존재). 따라서 M9 전까지는 non-blocking(정보용).
  # M9 에서 continue-on-error 를 제거해 강제 게이트로 전환한다(M9 DoD 4 음성 테스트 전제).
  linguist:
    runs-on: ubuntu-latest
    continue-on-error: true   # TODO(M9): 제거 — 언어 구성 게이트를 강제로 전환
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      # luarocks 는 기본이 5.1 트리 — --lua-version=5.4 필수 (PROGRESS 결정 로그 2026-07-21)
      - run: sudo apt-get update && sudo apt-get install -y lua5.4 liblua5.4-dev luarocks cmake libicu-dev && sudo luarocks --lua-version=5.4 install dkjson
      - run: sudo gem install github-linguist --no-document
      - name: 언어 구성 게이트
        run: |
          github-linguist --json | lua5.4 scripts/linguist-gate.lua \
            --main JavaScript --min 5.0 --max-main 35.0
